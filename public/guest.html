<!DOCTYPE html>
<html lang="ar">
<head>
  <link rel="icon" type="image/png" href="/images/logo.ico">
  <meta charset="UTF-8">
  <title>RG6 Button</title>

  <div class="logo-box">
  <img src="images/logo.png" class="site-logo">

  <div class="logo-title">
    RG6 Button | زر تركي
  </div>
</div>
  <link rel="stylesheet" href="style.css">
</head>
<body class="beige">

  <!-- شاشة الطلب -->
  <div id="requestScreen" class="overlay">
    <div class="card">
      <h2>الدخول للعبة</h2>
      <input type="text" id="playerName" placeholder="اكتب اسمك">
      <button id="sendRequestBtn">إرسال الطلب</button>
    </div>
  </div>

  <!-- شاشة الانتظار -->
  <div id="waitingScreen" class="overlay hidden">
    <div class="card">
      <h2>بانتظار قبول الطلب ⌛</h2>
    </div>
  </div>

  <!-- شاشة اللعبة -->
  <div id="gameScreen" class="hidden">
<hr>
<!-- ✅ شاشة العرض الكبيرة -->
<div class="media-screen" id="mediaScreen">

  <!-- للروابط -->
  <iframe id="mediaFrame" class="hidden"></iframe>

  <!-- للصور -->
  <img id="mediaImg" class="hidden" alt="media" />

  <!-- لمشاركة الشاشة -->
  <video id="mediaVideo" class="hidden" autoplay playsinline></video>

  <!-- رسالة افتراضية (تظهر للضيف فقط لما ما فيه شيء) -->
  <div id="mediaPlaceholder" class="media-placeholder hidden">
    اشغل وقتك بالاستغفار و التسبيح و ذكر الله
  </div>

</div>

    <!-- لوحة الفرق للضيف -->
    <div class="teams-wrapper guest-teams">
      <div class="team-card" id="gLeftCard">
        <div class="team-title guest-title" id="gLeftName">الفريق الأيسر</div>
        <div class="players-box" id="gLeftPlayers"></div>
        <div class="team-footer">
          عدد اللاعبين: <span id="gLeftCount">0</span>
        </div>
        <button class="joinBtn" id="gJoinLeft">انضم هنا</button>
      </div>

      <div class="team-card" id="gRightCard">
        <div class="team-title guest-title" id="gRightName">الفريق الأيمن</div>
        <div class="players-box" id="gRightPlayers"></div>
        <div class="team-footer">
          عدد اللاعبين: <span id="gRightCount">0</span>
        </div>
        <button class="joinBtn" id="gJoinRight">انضم هنا</button>
      </div>
    </div>

    <!-- ✅ شاشة تم ضغط الزر (داخل الصفحة + بالنص) -->
    <div id="buzzOverlay" class="buzz-panel hidden">
      <div class="buzz-card">
        <div class="buzz-title">تم ضغط الزر من قبل:</div>
        <div class="buzz-sub" id="buzzInfo">...</div>
        <div class="buzz-timer" id="buzzTimer">Timer: 0</div>
        <div class="buzz-timeup hidden" id="buzzTimeUp">انتهى الوقت</div>
      </div>
    </div>

    <!-- زر اللعبة -->
    <div class="buzz-wrap">
      <button id="buzzBtn" class="buzz-img buzz-red" aria-label="زر"></button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
